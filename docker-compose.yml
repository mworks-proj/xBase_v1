# xBase - Docker Compose configuration
# For local development and Evernode deployment

version: '3.8'

services:
  xbase:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xbase-app
    ports:
      - "3000:3000"
    environment:
      # Supabase Configuration
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # App Configuration
      - NEXT_PUBLIC_BASE_URL=${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/webhooks/xaman"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Optional: Local Supabase for development
# Uncomment to run Supabase locally
